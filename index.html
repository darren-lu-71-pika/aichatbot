<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>囍事知多少｜婚禮闖關小遊戲</title>
  <style>
    :root {
      --bg-1: #7a0016;
      --bg-2: #c1121f;
      --paper: rgba(255, 248, 235, 0.94);
      --ink: #5b1f12;
      --gold: #f0c36a;
      --gold-deep: #d59c2b;
      --rose: #ffe0db;
      --accent: #2f6f62;
      --good: #1f7a4d;
      --bad: #9b1c31;
      --shadow: 0 22px 60px rgba(49, 6, 12, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "PingFang TC", "Noto Serif TC", "Microsoft JhengHei", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255, 237, 205, 0.2), transparent 26%),
        linear-gradient(160deg, var(--bg-1) 0%, #9f0f22 34%, var(--bg-2) 100%);
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background:
        radial-gradient(circle at 15% 20%, rgba(255, 214, 153, 0.18), transparent 12%),
        radial-gradient(circle at 85% 25%, rgba(255, 214, 153, 0.14), transparent 10%),
        radial-gradient(circle at 20% 80%, rgba(255, 239, 211, 0.08), transparent 14%),
        radial-gradient(circle at 80% 75%, rgba(255, 239, 211, 0.08), transparent 14%);
      opacity: 0.9;
    }

    body::after {
      background-image:
        linear-gradient(rgba(255, 230, 190, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 230, 190, 0.06) 1px, transparent 1px);
      background-size: 26px 26px;
      mask-image: radial-gradient(circle at center, black 45%, transparent 92%);
      -webkit-mask-image: radial-gradient(circle at center, black 45%, transparent 92%);
    }

    .floating-lantern {
      position: fixed;
      top: -8vh;
      width: 58px;
      aspect-ratio: 0.75;
      border-radius: 16px;
      background: linear-gradient(180deg, #ffcb85 0%, #ff955b 18%, #d11b2a 100%);
      box-shadow: 0 0 24px rgba(255, 196, 110, 0.45);
      opacity: 0.72;
      z-index: 0;
      animation: drift linear infinite;
    }

    .floating-lantern::before,
    .floating-lantern::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }

    .floating-lantern::before {
      top: 8px;
      width: 26px;
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 241, 221, 0.55);
    }

    .floating-lantern::after {
      bottom: -14px;
      width: 2px;
      height: 18px;
      background: rgba(255, 228, 196, 0.8);
    }

    .shell {
      position: relative;
      z-index: 1;
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 28px 18px 72px;
    }

    .hero {
      padding: 18px 8px 26px;
      text-align: center;
    }

    .crest {
      display: inline-grid;
      place-items: center;
      width: 78px;
      height: 78px;
      margin-bottom: 14px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #fff0ca 0%, #e9ba55 58%, #be7f17 100%);
      color: #8d1723;
      font-size: 2rem;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(37, 4, 7, 0.3);
    }

    .hero h1 {
      margin: 0;
      font-size: clamp(2.1rem, 6vw, 4.4rem);
      letter-spacing: 0.08em;
      color: #fff6e4;
      text-shadow: 0 4px 18px rgba(73, 10, 16, 0.35);
    }

    .hero p {
      width: min(100%, 640px);
      margin: 14px auto 0;
      font-size: 1rem;
      line-height: 1.75;
      color: rgba(255, 245, 232, 0.9);
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(194, 125, 55, 0.35);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.1), transparent 10%),
        var(--paper);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 1px solid rgba(214, 158, 76, 0.28);
      border-radius: 20px;
      pointer-events: none;
    }

    .stage {
      padding: 26px;
    }

    .statusbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 243, 223, 0.95);
      border: 1px solid rgba(213, 156, 43, 0.35);
      font-size: 0.95rem;
      font-weight: 700;
    }

    .progress {
      flex: 1 1 240px;
      height: 14px;
      border-radius: 999px;
      background: rgba(156, 46, 41, 0.12);
      overflow: hidden;
      border: 1px solid rgba(184, 111, 58, 0.18);
    }

    .progress > span {
      display: block;
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #c9282e 0%, #f2bb58 100%);
      border-radius: inherit;
      transition: width 280ms ease;
    }

    .panel {
      display: none;
      min-height: 460px;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px 4px;
      animation: rise 420ms ease;
    }

    .panel.active {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 224, 219, 0.78);
      color: #9b1c31;
      font-weight: 700;
      letter-spacing: 0.08em;
    }

    .panel h2 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 1.2;
    }

    .panel p {
      max-width: 640px;
      margin: 0 auto;
      line-height: 1.8;
      font-size: 1.02rem;
    }

    .question-box {
      text-align: left;
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 10px 8px 0;
    }

    .question-index {
      color: #9b1c31;
      font-weight: 700;
      letter-spacing: 0.08em;
      margin-bottom: 10px;
    }

    .question-title {
      margin: 0 0 22px;
      font-size: clamp(1.45rem, 3.6vw, 2.3rem);
      line-height: 1.45;
    }

    .choices {
      display: grid;
      gap: 14px;
    }

    .choice {
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 18px 18px;
      text-align: left;
      color: var(--ink);
      background: rgba(255, 251, 243, 0.96);
      border: 1px solid rgba(199, 146, 72, 0.3);
      box-shadow: 0 8px 22px rgba(109, 42, 23, 0.08);
      cursor: pointer;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
      font: inherit;
    }

    .choice:hover,
    .choice:focus-visible {
      transform: translateY(-2px);
      outline: none;
      border-color: rgba(186, 66, 57, 0.65);
      box-shadow: 0 14px 30px rgba(109, 42, 23, 0.15);
    }

    .choice strong {
      display: inline-grid;
      place-items: center;
      width: 28px;
      height: 28px;
      margin-right: 12px;
      border-radius: 999px;
      background: #ffe6ca;
      color: #ac3b26;
      font-size: 0.95rem;
    }

    .feedback {
      min-height: 68px;
      width: min(100%, 720px);
      margin: 6px auto 0;
      padding: 14px 18px;
      border-radius: 18px;
      background: rgba(255, 247, 234, 0.9);
      border: 1px solid rgba(210, 165, 87, 0.25);
      line-height: 1.7;
      text-align: left;
    }

    .feedback.good {
      color: var(--good);
      border-color: rgba(31, 122, 77, 0.22);
      background: rgba(240, 255, 245, 0.92);
    }

    .feedback.bad {
      color: var(--bad);
      border-color: rgba(155, 28, 49, 0.22);
      background: rgba(255, 245, 247, 0.94);
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .button {
      border: 0;
      border-radius: 999px;
      padding: 14px 22px;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      letter-spacing: 0.04em;
      transition: transform 180ms ease, filter 180ms ease;
    }

    .button:hover,
    .button:focus-visible {
      transform: translateY(-2px);
      outline: none;
      filter: brightness(1.03);
    }

    .button-primary {
      color: #fffdf7;
      background: linear-gradient(135deg, #ab1d29, #df6a3e);
      box-shadow: 0 10px 26px rgba(145, 26, 35, 0.28);
    }

    .button-secondary {
      color: #7c2518;
      background: rgba(255, 238, 215, 0.96);
      border: 1px solid rgba(213, 156, 43, 0.34);
    }

    .result-medal {
      width: 110px;
      height: 110px;
      display: grid;
      place-items: center;
      margin: 0 auto;
      border-radius: 50%;
      color: #a41c24;
      font-size: 2.7rem;
      background: radial-gradient(circle at 35% 35%, #fff4d6 0%, #f5c76d 55%, #d09022 100%);
      box-shadow: 0 16px 34px rgba(104, 27, 15, 0.24);
    }

    .result-title {
      margin: 0;
      font-size: clamp(1.7rem, 4vw, 2.6rem);
    }

    .scoreline {
      font-weight: 700;
      color: #8d1723;
    }

    .blessing {
      max-width: 680px;
      padding: 18px 20px;
      border-radius: 22px;
      background: linear-gradient(180deg, rgba(255, 247, 233, 0.95), rgba(255, 238, 215, 0.92));
      border: 1px solid rgba(212, 159, 78, 0.3);
      line-height: 1.9;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 0.95rem;
      color: rgba(255, 244, 227, 0.82);
      text-align: center;
      line-height: 1.8;
    }

    .petals {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 3;
    }

    .petal {
      position: absolute;
      top: -10vh;
      width: 14px;
      height: 18px;
      border-radius: 14px 2px 14px 2px;
      background: linear-gradient(180deg, #ffd4dc 0%, #ff8fab 100%);
      opacity: 0.88;
      animation: fall linear forwards;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @keyframes drift {
      0% {
        transform: translate3d(0, -12vh, 0) rotate(0deg);
      }
      50% {
        transform: translate3d(16px, 54vh, 0) rotate(4deg);
      }
      100% {
        transform: translate3d(-12px, 120vh, 0) rotate(-4deg);
      }
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fall {
      from {
        transform: translate3d(0, 0, 0) rotate(0deg);
      }
      to {
        transform: translate3d(var(--drift), 115vh, 0) rotate(320deg);
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding-inline: 12px;
      }

      .stage {
        padding: 18px 16px 22px;
      }

      .panel {
        min-height: 420px;
      }

      .question-title {
        font-size: 1.35rem;
      }

      .choice {
        padding: 16px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="floating-lantern" style="left: 8%; animation-duration: 15s; animation-delay: -4s;"></div>
  <div class="floating-lantern" style="left: 22%; animation-duration: 18s; animation-delay: -11s; transform: scale(0.88);"></div>
  <div class="floating-lantern" style="left: 74%; animation-duration: 16s; animation-delay: -7s;"></div>
  <div class="floating-lantern" style="left: 88%; animation-duration: 19s; animation-delay: -14s; transform: scale(0.82);"></div>

  <div class="petals" id="petals" aria-hidden="true"></div>

  <main class="shell">
    <section class="hero">
      <div class="crest" aria-hidden="true">囍</div>
      <h1>囍事知多少</h1>
      <p>
        一場獻給婚禮現場的闖關小遊戲。看看你到底是新人故事的內行人，
        還是今天只是來負責鼓掌、吃甜湯和幫忙拍照的氣氛組。
      </p>
    </section>

    <section class="card stage">
      <div class="statusbar">
        <div class="badge" id="statusText">喜氣值準備中</div>
        <div class="progress" aria-hidden="true"><span id="progressBar"></span></div>
      </div>

      <section class="panel active" id="panelIntro">
        <span class="eyebrow">台味浪漫限定</span>
        <h2>準備好進入新人回憶副本了嗎？</h2>
        <p>
          一共四關，每答對一題都會替你累積一點喜氣值。
          最後看看你是「婚宴路人王」，還是能直接進入「新人故事編年史」的等級。
        </p>
        <div class="actions">
          <button class="button button-primary" id="startButton">開始闖關</button>
        </div>
      </section>

      <section class="panel" id="panelQuestion" aria-live="polite">
        <div class="question-box">
          <div class="question-index" id="questionIndex"></div>
          <h2 class="question-title" id="questionTitle"></h2>
          <div class="choices" id="choices"></div>
        </div>
        <div class="feedback" id="feedback">
          請選出你心中的答案，看看自己到底有多懂這對新人。
        </div>
      </section>

      <section class="panel" id="panelResult">
        <div class="result-medal" aria-hidden="true" id="resultEmoji">囍</div>
        <span class="eyebrow">闖關完成</span>
        <h2 class="result-title" id="resultTitle"></h2>
        <p class="scoreline" id="scoreLine"></p>
        <div class="blessing" id="resultMessage"></div>
        <div class="actions">
          <button class="button button-primary" id="restartButton">再玩一次</button>
          <button class="button button-secondary" id="shareButton">複製祝福文字</button>
        </div>
      </section>
    </section>

    <p class="footer-note">
      這是一個可直接上傳到 GitHub Pages 的單檔遊戲。<br>
      如果你要，我之後可以再幫你加上「新人照片」、「BGM 開關」或「最後結果分享卡」。
    </p>
  </main>

  <script>
    // 如果正解跟你的設定不同，只要改這個 answer 值就好。
    const questions = [
      {
        title: "新郎家的貓咪叫什麼名字？",
        choices: ["咪咪", "瞇咪", "咪咪寶寶"],
        answer: 0,
        correctNote: "答對了。看來你不是第一次聽到這隻貓的名號，已經有進親友圈內場的潛力。",
        wrongNote: "這題先差一點點。貓咪本人如果在場，應該會用一種高冷但包容的眼神看著你。"
      },
      {
        title: "新郎新娘第一次約會時，是下列哪一個寶可夢的社群日？",
        choices: ["泡沫栗鼠", "迷你龍", "咩利羊"],
        answer: 0,
        correctNote: "寶可夢系回憶也記得，這個程度很可以。戀愛時間軸你有在認真讀。",
        wrongNote: "可惜沒有命中。不過能把第一次約會和社群日綁在一起，本身就很有這對新人的味道。"
      },
      {
        title: "以下何人年紀比較大？",
        choices: ["新郎弟弟", "新娘", "Tom Holland"],
        answer: 0,
        correctNote: "答對了。這題不是八卦，是對時間感的精準掌握。",
        wrongNote: "這題翻車也很合理，畢竟 Tom Holland 出現在選項裡本身就很擾亂軍心。"
      },
      {
        title: "哪個食物兩人都不愛吃？",
        choices: ["木耳", "蘿蔔絲", "三色豆"],
        answer: 0,
        correctNote: "命中。你已經掌握到可以一起點餐、不太會踩雷的程度了。",
        wrongNote: "差一點。口味這種事最有台灣感，婚後餐桌外交還是要慢慢修煉。"
      }
    ];

    const results = [
      {
        min: 4,
        title: "新人故事編年史",
        emoji: "金",
        message:
          "你對這段感情的熟悉程度，已經不是普通賓客，而是像一本會走路的新人年表。" +
          " 今天這場喜酒，你不只是來見證，更像是一路陪著這段故事長大的自己人。"
      },
      {
        min: 2,
        title: "婚宴氣氛大隊長",
        emoji: "囍",
        message:
          "你很懂這對新人，也很懂婚禮最重要的是什麼。" +
          " 不一定每題都全中，但你身上那種願意一起笑、一起祝福的溫度，才是現場最珍貴的喜氣。"
      },
      {
        min: 0,
        title: "吃喜酒路人王",
        emoji: "福",
        message:
          "今天也許你不是最懂新人故事的人，但你願意打開這個遊戲，就已經是祝福的一部分。" +
          " 婚禮本來就不是考試，而是大家一起來替一段感情熱鬧、作伴、留念。"
      }
    ];

    const panels = {
      intro: document.getElementById("panelIntro"),
      question: document.getElementById("panelQuestion"),
      result: document.getElementById("panelResult")
    };

    const statusText = document.getElementById("statusText");
    const progressBar = document.getElementById("progressBar");
    const questionIndex = document.getElementById("questionIndex");
    const questionTitle = document.getElementById("questionTitle");
    const choices = document.getElementById("choices");
    const feedback = document.getElementById("feedback");
    const resultEmoji = document.getElementById("resultEmoji");
    const resultTitle = document.getElementById("resultTitle");
    const scoreLine = document.getElementById("scoreLine");
    const resultMessage = document.getElementById("resultMessage");
    const petals = document.getElementById("petals");

    const startButton = document.getElementById("startButton");
    const restartButton = document.getElementById("restartButton");
    const shareButton = document.getElementById("shareButton");

    let currentQuestion = 0;
    let score = 0;
    let locked = false;

    function setActivePanel(target) {
      Object.values(panels).forEach((panel) => panel.classList.remove("active"));
      target.classList.add("active");
    }

    function updateProgress() {
      const progress = (currentQuestion / questions.length) * 100;
      progressBar.style.width = progress + "%";
      statusText.textContent = currentQuestion === 0
        ? "喜氣值準備中"
        : "目前喜氣值 " + score + " / " + currentQuestion;
    }

    function renderQuestion() {
      locked = false;
      setActivePanel(panels.question);
      updateProgress();

      const item = questions[currentQuestion];
      questionIndex.textContent = "第 " + (currentQuestion + 1) + " 關 / 共 " + questions.length + " 關";
      questionTitle.textContent = item.title;
      feedback.className = "feedback";
      feedback.textContent = "請選出你心中的答案，看看自己到底有多懂這對新人。";
      choices.innerHTML = "";

      item.choices.forEach((choice, index) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice";
        button.innerHTML = "<strong>" + String.fromCharCode(65 + index) + "</strong>" + choice;
        button.addEventListener("click", () => handleAnswer(index));
        choices.appendChild(button);
      });
    }

    function handleAnswer(index) {
      if (locked) return;
      locked = true;

      const item = questions[currentQuestion];
      const correct = index === item.answer;

      if (correct) {
        score += 1;
        feedback.className = "feedback good";
        feedback.textContent = item.correctNote;
        burstPetals(22);
        playTone(740, 0.08);
        playTone(920, 0.08, 0.09);
      } else {
        feedback.className = "feedback bad";
        feedback.textContent = item.wrongNote;
        playTone(220, 0.1);
      }

      const buttons = Array.from(choices.querySelectorAll("button"));
      buttons.forEach((button, buttonIndex) => {
        button.disabled = true;
        if (buttonIndex === item.answer) {
          button.style.borderColor = "rgba(31, 122, 77, 0.55)";
          button.style.background = "rgba(239, 255, 244, 0.96)";
        } else if (buttonIndex === index) {
          button.style.borderColor = "rgba(155, 28, 49, 0.5)";
          button.style.background = "rgba(255, 244, 247, 0.96)";
        }
      });

      window.setTimeout(() => {
        currentQuestion += 1;
        if (currentQuestion < questions.length) {
          renderQuestion();
        } else {
          renderResult();
        }
      }, 1500);
    }

    function renderResult() {
      setActivePanel(panels.result);
      updateProgress();
      progressBar.style.width = "100%";
      statusText.textContent = "喜氣值結算完成";

      const result = results.find((item) => score >= item.min) || results[results.length - 1];
      resultEmoji.textContent = result.emoji;
      resultTitle.textContent = result.title;
      scoreLine.textContent = "你答對了 " + score + " / " + questions.length + " 題";
      resultMessage.textContent = result.message;
      burstPetals(40);
      playTone(660, 0.08);
      playTone(880, 0.08, 0.1);
      playTone(1100, 0.1, 0.2);
    }

    function restartGame() {
      currentQuestion = 0;
      score = 0;
      updateProgress();
      setActivePanel(panels.intro);
    }

    function burstPetals(count) {
      for (let i = 0; i < count; i += 1) {
        const petal = document.createElement("span");
        petal.className = "petal";
        petal.style.left = Math.random() * 100 + "vw";
        petal.style.animationDuration = 3.6 + Math.random() * 2.4 + "s";
        petal.style.animationDelay = Math.random() * 0.2 + "s";
        petal.style.setProperty("--drift", (Math.random() * 160 - 80) + "px");
        petal.style.opacity = (0.55 + Math.random() * 0.4).toFixed(2);
        petals.appendChild(petal);

        window.setTimeout(() => {
          petal.remove();
        }, 6200);
      }
    }

    function playTone(frequency, duration, delay = 0) {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) return;

      window.setTimeout(() => {
        const context = new AudioContextClass();
        const oscillator = context.createOscillator();
        const gain = context.createGain();

        oscillator.type = "sine";
        oscillator.frequency.value = frequency;
        gain.gain.setValueAtTime(0.0001, context.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.035, context.currentTime + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.0001, context.currentTime + duration);

        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start();
        oscillator.stop(context.currentTime + duration + 0.02);
        oscillator.onended = () => context.close();
      }, delay * 1000);
    }

    async function copyBlessing() {
      const text =
        "我剛玩完《囍事知多少》婚禮闖關小遊戲，拿到「" +
        resultTitle.textContent +
        "」稱號，答對 " +
        score +
        " 題。祝新人百年好合、平安順心、天天都有今天這種熱鬧甜甜的心情。";

      try {
        await navigator.clipboard.writeText(text);
        shareButton.textContent = "已複製祝福文字";
      } catch (error) {
        shareButton.textContent = "複製失敗，請長按手動複製";
      }

      window.setTimeout(() => {
        shareButton.textContent = "複製祝福文字";
      }, 1800);
    }

    startButton.addEventListener("click", renderQuestion);
    restartButton.addEventListener("click", restartGame);
    shareButton.addEventListener("click", copyBlessing);

    updateProgress();
  </script>
</body>
